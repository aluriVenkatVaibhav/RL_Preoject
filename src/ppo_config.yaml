# ppo_config.yaml
# PPO-focused training configuration.
#
# This mirrors the smallClassic environment used by dqn_config.yaml so PPO can be
# compared against the improved DQN baseline without sharing DQN-specific tuning
# names in the command. PPO still ignores DQN-only fields in train.py.

env:
  layout: "smallClassic"
  num_ghosts: 1
  timeout: 60

training:
  num_episodes: 2000
  eval_episodes: 10
  save_interval: 100
  plot_interval: 200
  results_dir: "./results"
  max_steps_per_episode: 500

hyperparameters:
  # Shared
  gamma: 0.99
  learning_rate: 0.0001

  # Tabular agents
  alpha: 0.1
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_episodes: 500

  # DQN-only fields kept for schema compatibility; PPO does not use them.
  batch_size: 64
  buffer_capacity: 50000
  epsilon_decay_steps: 20000
  warmup_steps: 500
  target_update_interval: 1
  target_update_tau: 0.005
  reward_scale: 0.1
  reward_clip: 50.0
  avoid_stop: true

  # PPO
  ppo_learning_rate: 0.0003
  ppo_learning_rate_end: 0.00008
  ppo_lr_decay_updates: 150
  ppo_batch_size: 128
  ppo_epochs: 4
  ppo_update_episodes: 5
  ppo_clip: 0.2
  ppo_value_clip: 0.2
  gae_lambda: 0.95
  entropy_coef: 0.06
  ppo_entropy_coef_start: 0.05
  ppo_entropy_coef_end: 0.003
  ppo_entropy_decay_updates: 150
  value_loss_coef: 0.5
  ppo_reward_scale: 0.2
  ppo_reward_clip: 100.0
  ppo_avoid_stop: true
  ppo_max_grad_norm: 0.5

multiagent:
  mode: "random"
  alternating_interval: 100

hierarchical:
  goal_interval: 5
  meta_lr: 0.0001
  meta_gamma: 0.99
  meta_epsilon_start: 1.0
  meta_epsilon_end: 0.1
  meta_epsilon_decay_steps: 5000
  skill_alpha: 0.3
  skill_epsilon: 0.15
  skill_gamma: 0.95
  ghost_goal_interval: 15
  ghost_epsilon: 0.2
  ghost_alpha: 0.2
